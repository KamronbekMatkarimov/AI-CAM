<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CamAI Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <h1>CamAI People Monitoring</h1>
      <div class="badge">Next run in: <b id="nextRunCountdown">-</b></div>
    </header>

    <section class="summary">
      <div class="summary-card">
        <span class="summary-label">Total People</span>
        <span id="totalPeople" class="summary-value">0</span>
      </div>
    </section>

    <section class="grid">
      {% for cam in cameras %}
      <article class="camera-card">
        <div class="camera-head">
          <h2>{{ cam|upper }}</h2>
          <span id="{{ cam }}Count" class="count-pill">0 people</span>
        </div>
        <div class="camera-frame-wrap">
          <img id="{{ cam }}Img" class="camera-frame" alt="{{ cam }} frame" />
          <div id="{{ cam }}Empty" class="empty-state">No processed frame yet</div>
        </div>
        <div class="camera-meta">
          <span>Last update:</span>
          <span id="{{ cam }}Ts">-</span>
        </div>
      </article>
      {% endfor %}
    </section>

    <section class="upload-section">
      <article class="upload-card">
        <h2>Image Upload Detection</h2>
        <form id="uploadForm" class="upload-form">
          <label>
            Camera profile:
            <select id="uploadCameraId" name="camera_id">
              {% for cam in cameras %}
              <option value="{{ cam }}">{{ cam|upper }}</option>
              {% endfor %}
            </select>
          </label>
          <label>
            Choose image:
            <input id="uploadImageInput" type="file" name="image" accept=".jpg,.jpeg,.png,.bmp" required />
          </label>
          <button type="submit">Upload</button>
        </form>
        <div id="uploadResult" class="upload-result">No upload yet.</div>
        <div class="upload-preview-wrap">
          <img id="uploadPreview" class="upload-preview" alt="Upload detection result" />
        </div>
      </article>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
